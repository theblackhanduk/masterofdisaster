<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: "Courier New", monospace;
    font-size: 14px;
  }

  #terminal {
    padding: 20px;
    white-space: pre-wrap;
    line-height: 1.4;
  }

  .cursor {
    display: inline-block;
    width: 10px;
    background: #00ff9f;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="terminal"></div>

<script>
const lines = [
"$ boot_sequence --init",
"",
"[    0.0001 ] Initializing kernel...",
"[    0.0420 ] Mounting /dev/blackhand",
"[    0.0666 ] Loading modules: distortion, feedback, chaos",
"",
"$ whoami",
"visitor",
"",
"$ sudo access /var/blackhand/secure_archive",
"[sudo] password for visitor: ********",
"",
"Access granted.",
"",
"$ ls -la",
"master_of_disaster.bin",
"release.info",
"signal.log",
"",
"$ cat release.info",
"----------------------------------------",
"ARTIST: THE BLACKHAND",
"PROJECT: MASTER OF DISASTER",
"STATUS: CLASSIFIED",
"RELEASE: LATE 2026",
"----------------------------------------",
"",
"$ ./master_of_disaster.bin",
"",
"[#####...............] 25%",
"Injecting noise...",
"Corrupting silence...",
"",
"[##########..........] 50%",
"Amplifying signal...",
"Distortion rising...",
"",
"[###############.....] 75%",
"Warning: system instability detected",
"",
"[####################] 100%",
"",
"ERROR: containment failure",
"ERROR: volume threshold exceeded",
"",
"$ tail -f signal.log",
"...incoming transmission...",
"...frequency unstable...",
"",
"THE BLACKHAND IS COMING",
"MASTER OF DISASTER WILL BE UNLEASHED",
"",
"$ shutdown -h now",
"System halted."
];

let i = 0;
let j = 0;
const speed = 25; // typing speed

const terminal = document.getElementById("terminal");

function typeLine() {
  if (i < lines.length) {
    if (j < lines[i].length) {
      terminal.innerHTML += lines[i].charAt(j);
      j++;
      setTimeout(typeLine, speed);
    } else {
      terminal.innerHTML += "\n";
      i++;
      j = 0;
      setTimeout(typeLine, 200);
    }
  } else {
    terminal.innerHTML += '<span class="cursor"></span>';
  }
}

typeLine();
</script>

</body>
</html>
