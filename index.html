<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: "Courier New", monospace;
    font-size: 16px;
    overflow: hidden;
  }

  #terminal, #logoScreen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  #logoScreen {
    display: none;
    flex-direction: column;
    text-align: center;
    color: white;
  }

  .cursor {
    display: inline-block;
    width: 10px;
    background: #00ff9f;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
  }

  /* GLITCH */
  .glitch {
    animation: glitch 0.2s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(0px, 0px); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0px, 0px); }
  }

  /* FLICKER */
  .flicker {
    animation: flicker 0.1s infinite;
  }

  @keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
  }

  /* FLASH */
  .flash {
    animation: flash 0.3s;
  }

  @keyframes flash {
    0% { background: black; }
    50% { background: #00ff9f; }
    100% { background: black; }
  }

  /* ENTER PROMPT */
  #enterPrompt {
    margin-top: 20px;
    color: #00ff9f;
    animation: blink 1s infinite;
  }

  /* LOGO STYLE */
  #logoScreen img {
  max-width: 90vw; /* 90% of viewport width */
  height: auto;
  margin-bottom: 20px;
}

  #subtitle {
    font-size: 18px;
    opacity: 0.8;
  }
</style>

</head>
<body>

<div id="terminal"></div>

<div id="logoScreen">
  <!-- Logo image -->
  <img src="logo.png.png" alt="THEBLACKHANDLOGO">
</div>

<script>
const glitchSound = new Audio("videoplayback.m4a");
glitchSound.volume = 0.7; // optional (0.0 to 1.0)

const lines = [
"$ boot_sequence --init",
"[ OK ] Initiating THE BLACKHAND protocol",
"",
"$ access master_of_disaster.bin",
"Access granted.",
"",
"> Executing...",
"",
"[#####.....] 50%",
"Injecting distortion...",
"",
"[##########] 100%",
"",
"........",
"",
"PAUSE:1000",  // 1 second pause
"ERROR: containment failed",
"PAUSE:2000",  // 2 second pause
"",
"THE BLACKHAND ARE BACK",
"",
"MASTER OF DISASTER",
"COMING SOON"
];

let i = 0;
let j = 0;
const speed = 25;

const terminal = document.getElementById("terminal");

function typeLine() {
  if (i < lines.length) {
    if (lines[i].startsWith("PAUSE:")) {
      const delay = parseInt(lines[i].split(":")[1]);
      i++;
      setTimeout(typeLine, delay);
    } else if (j < lines[i].length) {
      terminal.innerHTML += lines[i].charAt(j);
      j++;
      setTimeout(typeLine, speed);
    } else {
      terminal.innerHTML += "\n";
      i++;
      j = 0;
      setTimeout(typeLine, 120);
    }
  } else {
    terminal.innerHTML += '\n\n<span class="cursor"></span>';

    // Glitch sequence
    setTimeout(() => {
      document.body.classList.add("flash");
      glitchSound.currentTime = 0;
      glitchSound.play();
      setTimeout(() => {
        document.body.classList.remove("flash");
        terminal.classList.add("glitch");
        document.body.classList.add("flicker");

        // Clear terminal text and show ENTER prompt
        setTimeout(() => {
          terminal.innerHTML = "PRESS ENTER TO CONTINUE_";
        }, 800);

      }, 200);
    }, 1500);
  }
}

typeLine();

// Listen for ENTER key
let hasEntered = false;

function triggerEnter() {
  if (hasEntered) return;
  hasEntered = true;
  showLogo();
}

// Keyboard (desktop)
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    triggerEnter();
  }
});

// Mobile tap
document.addEventListener("touchstart", function() {
  triggerEnter();
});

// Mouse click
document.addEventListener("click", function() {
  triggerEnter();
});

function showLogo() {
  document.body.classList.remove("flicker");
  terminal.style.display = "none";

  const logoScreen = document.getElementById("logoScreen");
  logoScreen.style.display = "flex";
}
</script>

</body>
</html>
