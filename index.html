<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: "Courier New", monospace;
    font-size: 16px;
    overflow: hidden; /* prevents scrolling */
  }

  #terminal {
    padding: 40px;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  .cursor {
    display: inline-block;
    width: 10px;
    background: #00ff9f;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="terminal"></div>

<script>
const lines = [
"$ boot_sequence --init",
"[ OK ] Loading BLACKHAND protocol",
"",
"$ access master_of_disaster.bin",
"Access granted.",
"",
"> Executing...",
"",
"[#####.....] 50%",
"Injecting distortion...",
"",
"[#######...] 75%",
"Creating chaos...",  
"",
"[##########] 100%",
"",  
"ERROR: containment failed",
"",
"THE BLACKHAND ARE BACK",
"MASTER OF DISASTER",
"2026"
];

let i = 0;
let j = 0;
const speed = 30;

const terminal = document.getElementById("terminal");

function typeLine() {
  if (i < lines.length) {
    if (j < lines[i].length) {
      terminal.innerHTML += lines[i].charAt(j);
      j++;
      setTimeout(typeLine, speed);
    } else {
      terminal.innerHTML += "\n";
      i++;
      j = 0;
      setTimeout(typeLine, 150);
    }
  } else {
    terminal.innerHTML += '\n\n$ <span class="cursor"></span>';
  }
}

typeLine();
</script>

</body>
</html>
